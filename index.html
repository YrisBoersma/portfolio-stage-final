<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Yris Boersma</title>


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Press+Start+2P&family=Spicy+Rice&family=Titan+One&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://use.typekit.net/lcj2aaz.css">

</head>


<body>

    <header>
        <div class="links">
            <a href="index.html"> <img src="assets/homebutton.png" alt="home button"></a>
        </div>

        <div class="rechts">
            <a href="#portfolio">My work</a>
            <a href="#contact">Contact</a>
        </div>

    </header>

    <div class="intro" id="intro">

        <div class="foto-me">
            <img src="assets/startpage.png" alt="foto van Yris Boersma">
        </div>

    </div>


    <section class="spacecode-video-section">

        <div class="video-container">
            <video id="myVideo" preload="metadata" muted>
                <source src="assets/travelvid.mov" type="video/mp4">
                Je browser ondersteunt geen video.
            </video>

            <div class="video-controls">
                <button id="playPause">▶️</button>
                <button id="backward">⏪ 10s</button>
                <button id="forward">10s ⏩</button>
                <input type="range" id="progress" value="0">
                <button id="mute">🔊</button>
            </div>
        </div>

    </section>

    <script src="js/script.js"></script>


    <div class="portfolio" id="portfolio">

        <a href="photography.html"><img src="assets/photography-pic.png" alt=""></a>

        <div class="Artworks"><a href="artworks.html"><img src="assets/artworks-pic.png" alt=""></a></div>

        <div class="MMS"><a href="MMS.html"><img src="assets/MMS-pic.png" alt=""></a></div>

        <div class="Moventis"><a href="moventis.html"><img src="assets/Moventis-pic.png" alt=""></a></div>

        <div class="Spacecode"><a href="spacecode.html"><img src="assets/spacecode-pic.png" alt=""></a></div>

    </div>



    <footer>

        <div class="info" id="contact">
            <img src="assets/footer.png" alt="brief met contactgegevens">

        </div>

    </footer>



    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/nl.js"></script>


    <script src="js/script.js"></script>

</html>
